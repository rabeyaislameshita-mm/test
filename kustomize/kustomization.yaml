apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: istio-system

resources:
  - base/istio-base.yaml
  - base/istiod.yaml
  - base/istio-ingressgateway.yaml
  - base/istio-egressgateway.yaml
  - base/kiali.yaml

patchesStrategicMerge:
  - patches/istiod-patch.yaml
  - patches/ingressgateway-patch.yaml
  - patches/kiali-patch.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: istio-observability

commonAnnotations:
  deployment.istio.io/version: "1.18.2"
  kustomize.config.k8s.io/version: "5.0.0"
