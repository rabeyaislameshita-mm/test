---
# Ejemplo de VirtualService para controlar el tráfico
# Este archivo muestra cómo configurar el tráfico entre versiones de un servicio

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: my-app
  namespace: istio-dev
spec:
  hosts:
  - my-app
  http:
  - match:
    - uri:
        prefix: "/api/v2"
    route:
    - destination:
        host: my-app
        subset: v2
      weight: 100
  - route:
    - destination:
        host: my-app
        subset: v1
      weight: 100

---
# DestinationRule para definir los subsets de destino
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: my-app
  namespace: istio-dev
spec:
  host: my-app
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 100
    loadBalancer:
      simple: ROUND_ROBIN
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
  subsets:
  - name: v1
    labels:
      version: v1
  - name: v2
    labels:
      version: v2

---
# Gateway para el ingress
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: my-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "my-app.example.com"
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: my-app-cert
    hosts:
    - "my-app.example.com"

---
# VirtualService para el Gateway
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: my-app-ingress
  namespace: istio-system
spec:
  hosts:
  - "my-app.example.com"
  gateways:
  - my-gateway
  http:
  - route:
    - destination:
        host: my-app.istio-dev.svc.cluster.local
        port:
          number: 8080
      weight: 100

---
# PeerAuthentication para mTLS
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-dev
spec:
  mtls:
    mode: STRICT
  portLevelMtls:
    8080:
      mode: DISABLE

---
# AuthorizationPolicy para control de acceso
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: my-app-policy
  namespace: istio-dev
spec:
  selector:
    matchLabels:
      app: my-app
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/istio-dev/sa/my-app"]
    to:
    - operation:
        methods: ["GET", "POST"]
        paths: ["/api/*"]

---
# ServiceEntry para servicios externos
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-api
  namespace: istio-dev
spec:
  hosts:
  - api.example.com
  ports:
  - number: 443
    name: https
    protocol: HTTPS
  location: MESH_EXTERNAL
  resolution: DNS

---
# Ejemplo de Sidecar para controlar el tráfico
apiVersion: networking.istio.io/v1beta1
kind: Sidecar
metadata:
  name: default
  namespace: istio-dev
spec:
  egress:
  - hosts:
    - "istio-dev/*"
    - "istio-system/*"
    - "*.example.com"
